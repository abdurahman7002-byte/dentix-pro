<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bills Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* =========================
   BASE
========================= */

body{
    margin:0;
    padding:25px;
    font-family:Segoe UI, Arial;
    background: radial-gradient(circle at top,#0f172a,#020617);
    color:white;
}

/* =========================
   BACK BUTTON
========================= */

.back-btn{
    background: linear-gradient(135deg,#6366f1,#06b6d4);
    color:white;
    padding:12px 16px;
    border-radius:14px;
    border:none;
    cursor:pointer;
    font-weight:700;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    transition:0.3s;
    margin-bottom:20px;
}

.back-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

/* =========================
   CARDS
========================= */

.card{
    background: rgba(30,41,59,0.75);
    backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:22px;
    margin-bottom:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    transition:0.3s;
}

.card:hover{
    transform: translateY(-2px);
}

/* =========================
   HEADERS
========================= */

h2{
    margin-top:0;
    font-size:20px;
    display:flex;
    align-items:center;
    gap:10px;
}

/* =========================
   INPUTS
========================= */

input{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    background: rgba(51,65,85,0.8);
    color:white;
    outline:none;
    font-size:14px;
    box-sizing:border-box;
    transition:0.3s;
}

input:focus{
    background: rgba(71,85,105,0.9);
    box-shadow:0 0 0 2px #06b6d4;
}

/* =========================
   SAVE BUTTON
========================= */

.save-btn{
    width:100%;
    margin-top:18px;
    padding:14px;
    border-radius:12px;
    color:white;
    font-weight:bold;
    border:none;
    cursor:pointer;
    background: linear-gradient(135deg,#10b981,#06b6d4);
    box-shadow:0 10px 25px rgba(16,185,129,0.3);
    transition:0.3s;
}

.save-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 35px rgba(16,185,129,0.4);
}

/* =========================
   BILL ITEM
========================= */

.bill-item{
    background: rgba(51,65,85,0.85);
    border-radius:14px;
    padding:16px;
    margin-bottom:12px;
    border:1px solid rgba(255,255,255,0.06);
    transition:0.3s;
}

.bill-item:hover{
    transform: translateY(-2px);
    background: rgba(71,85,105,0.9);
}

/* =========================
   TEXT STYLES
========================= */

.bill-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:6px;
}

.bill-date{
    color:#94a3b8;
    font-size:13px;
}

.amount{
    color:#22c55e;
    font-weight:800;
    margin-top:6px;
    font-size:15px;
}

/* =========================
   DELETE BUTTON
========================= */

.delete-btn{
    margin-top:10px;
    background: linear-gradient(135deg,#ef4444,#dc2626);
    color:white;
    padding:9px 14px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-weight:700;
    transition:0.3s;
}

.delete-btn:hover{
    transform: scale(1.05);
    box-shadow:0 10px 20px rgba(239,68,68,0.3);
}

/* =========================
   SMALL NOTE
========================= */

h6{
    color:#94a3b8;
    font-weight:400;
    margin-top:5px;
}

.dashboard-card{
    background: linear-gradient(135deg, #0f172a, #1e293b);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 18px 20px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    color: #fff;
    transition: 0.3s ease;
    position: relative;
    overflow: hidden;
}

.dashboard-card:hover{
    transform: translateY(-4px);
    box-shadow: 0 14px 35px rgba(0,0,0,0.35);
}

/* خط زخرفي خفيف */
.dashboard-card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:4px;
    background: linear-gradient(90deg,#3b82f6,#06b6d4,#22c55e);
}

/* الرقم */
.dashboard-card .value{
    font-size: 26px;
    font-weight: 800;
    margin-top: 8px;
}

/* الوصف */
.dashboard-card .label{
    font-size: 13px;
    color: #94a3b8;
    margin-top: 6px;
}

body{
    padding-bottom:85px;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:70px;

    background:#0f172a;

    display:flex;

    align-items:center;

    border-top:1px solid rgba(255,255,255,.08);

    box-shadow:0 -4px 20px rgba(0,0,0,.4);

    z-index:99999;
}

.nav-item{
    flex:1;   /* 👈 أهم سطر: يجعل كل عنصر يملأ الشريط */
    
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    text-decoration:none;

    color:#94a3b8;

    font-size:11px;

    gap:4px;

    height:100%;
}

.nav-item i{
    font-size:20px;
}

.nav-item.active{
    color:#38bdf8;
}

.bills-card{
    background:#1e1e1e;
    border:1px solid #2d2d2d;
    border-radius:20px;
    padding:20px;
    box-shadow:0 8px 25px rgba(0,0,0,.35);
}

.card-header h2{
    margin:0;
    color:#ffffff;
    font-size:22px;
    display:flex;
    align-items:center;
    gap:10px;
}

.card-header h2 i{
    color:#4da3ff;
}

.card-header p{
    margin-top:5px;
    color:#9aa0a6;
    font-size:14px;
}

.info-box{
    background:rgba(77,163,255,.12);
    border:1px solid rgba(77,163,255,.25);
    color:#7ab8ff;
    padding:12px 15px;
    border-radius:14px;
    margin:18px 0;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
}

#billsContainer{
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* كل فاتورة */
.bill-item{
    background:#252525;
    border:1px solid #333;
    border-radius:16px;
    padding:15px;
    transition:all .25s ease;
}

.bill-item:hover{
    transform:translateY(-2px);
    border-color:#4da3ff;
    box-shadow:0 8px 20px rgba(0,0,0,.4);
}

.bill-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.bill-name{
    color:#fff;
    font-size:16px;
    font-weight:600;
}

.bill-date{
    color:#9aa0a6;
    font-size:13px;
}

.bill-amount{
    margin-top:12px;
    color:#38d67a;
    font-size:22px;
    font-weight:bold;
}

/* شارة حالة الفاتورة */
.bill-status{
    display:inline-block;
    margin-top:10px;
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
}

.bill-status.paid{
    background:rgba(56,214,122,.15);
    color:#38d67a;
}

.bill-status.unpaid{
    background:rgba(255,107,107,.15);
    color:#ff6b6b;
}

/* =========================
   Bills Container Grid
========================= */

#billsContainer{
    display:grid;
        grid-template-columns:repeat(auto-fill,minmax(230px,1fr));

    gap:18px;
    margin-top:20px;
}

/* =========================
   Bill Card
========================= */

.bill-item{
    background:linear-gradient(
        145deg,
        #232323,
        #1b1b1b
    );
    border:1px solid #303030;
    border-radius:20px;
        padding:14px;

    position:relative;
    overflow:hidden;
    transition:0.3s ease;
    box-shadow:
        0 8px 20px rgba(0,0,0,.25),
        inset 0 1px 0 rgba(255,255,255,.03);
}

.bill-item:hover{
    transform:translateY(-4px);
    border-color:#3b82f6;
    box-shadow:
        0 15px 30px rgba(0,0,0,.35),
        0 0 20px rgba(59,130,246,.15);
}

/* الخط الأزرق العلوي */

.bill-item::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:4px;
    background:linear-gradient(
        90deg,
        #3b82f6,
        #06b6d4
    );
}

/* =========================
   Text
========================= */

.bill-title{
      font-size:17px;

    font-weight:700;
    color:#fff;
    margin-bottom:10px;
    word-break:break-word;
}

.bill-item div:nth-child(2){
    color:#b5b5b5;
    line-height:1.6;
    margin-bottom:15px;
    min-height:45px;
}

.amount{
       font-size:22px;

    font-weight:800;
    color:#22c55e;
    margin-bottom:10px;
}

.bill-date{
    color:#8f8f8f;
    font-size:13px;
    border-top:1px solid #333;
    padding-top:12px;
    margin-top:10px;
}

/* =========================
   Buttons Area
========================= */

.bill-item > div:last-child{
    display:flex;
    gap:10px;
    margin-top:15px;
}

/* =========================
   Edit Button
========================= */

.edit-btn{
    flex:1;
    background:linear-gradient(
        135deg,
        #3b82f6,
        #06b6d4
    ) !important;

    border:none;
    border-radius:12px !important;
    color:white;
    font-weight:700;
    padding:10px 15px !important;
    cursor:pointer;

    box-shadow:
        0 8px 20px rgba(59,130,246,.25);

    transition:.25s;
}

.edit-btn:hover{
    transform:translateY(-2px);
}

/* =========================
   Delete Button
========================= */

.delete-btn{
    flex:1;

    background:linear-gradient(
        135deg,
        #ef4444,
        #dc2626
    );

    border:none;
    border-radius:12px;
    color:white;
    font-weight:700;
    padding:10px 15px;
    cursor:pointer;

    box-shadow:
        0 8px 20px rgba(239,68,68,.25);

    transition:.25s;
}

.delete-btn:hover{
    transform:translateY(-2px);
}

/* =========================
   Mobile
========================= */

@media(max-width:600px){

    #billsContainer{
        grid-template-columns:1fr;
    }

}

.search-box{
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    background:#232323;
    border:1px solid #333;
    border-radius:14px;
    padding:14px 18px;
    color:white;
    font-size:15px;
    outline:none;
    transition:.3s;
}

.search-box input:focus{
    border-color:#3b82f6;
    box-shadow:0 0 15px rgba(59,130,246,.2);
}

.search-box input::placeholder{
    color:#888;
}

.dashboard-divider{
    height:1px;
    width:100%;
    margin:25px 0;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(128,255,219,.6),
        transparent
    );

    position:relative;
}

/* نقطة في المنتصف */
.dashboard-divider::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);

    width:8px;
    height:8px;
    border-radius:50%;

    background:#80ffdb;
    box-shadow:0 0 10px #80ffdb;
}

/* ===========================
   BILL DETAILS
=========================== */

.bill-summary{

    background:
    linear-gradient(
        135deg,
        #ef4444,
        #f97316
    );

    color:white;

    display:flex;

    align-items:center;

    gap:14px;

    padding:16px 22px;

    border-radius:18px;

    font-size:17px;

    font-weight:700;

    box-shadow:
    0 12px 30px rgba(239,68,68,.30);

    transition:.3s;
}

.bill-summary:hover{

    transform:translateY(-2px);

    box-shadow:
    0 18px 38px rgba(239,68,68,.40);
}

.bill-icon{

    width:42px;
    height:42px;

    border-radius:50%;

    display:flex;

    align-items:center;
    justify-content:center;

    background:rgba(255,255,255,.18);

    font-size:20px;
}

.bill-summary::after{

    content:"▼";

    margin-left:auto;

    font-size:13px;

    transition:.3s;
}

.modern-details[open] .bill-summary::after{

    transform:rotate(180deg);
}

.modern-details[open] .bill-summary{

    border-bottom-left-radius:12px;
    border-bottom-right-radius:12px;
}

</style>
</head>

<body>
